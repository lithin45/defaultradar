# ============================================================================
# DefaultRadar — one-command local MLOps stack.
#   docker compose up   (or `make up`) brings up:
#     postgres  : MLflow backend store
#     mlflow    : tracking server + Model Registry + served artifacts  (:5000)
#     scorer    : FastAPI, loads the Production model, /predict          (:8000)
#     prefect   : Prefect 3 orchestration server (monitoring/retrain)    (:4200)
# Startup ordering + healthchecks ensure dependents wait for healthy deps.
# ============================================================================
name: defaultradar

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  scorer:
    # scorer and prefect share ONE image (same Dockerfile) — built once, not twice.
    image: defaultradar-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_REGISTERED_MODEL_NAME: ${MLFLOW_REGISTERED_MODEL_NAME:-defaultradar-default-classifier}
    command: uvicorn defaultradar.serving.app:app --host 0.0.0.0 --port 8000
    ports:
      - "${SCORER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  prefect:
    image: defaultradar-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      PREFECT_HOME: /app/.prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://localhost:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: prefect server start --host 0.0.0.0 --port 4200
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    volumes:
      - prefect-data:/app/.prefect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  pgdata:
  mlflow-artifacts:
  prefect-data:
